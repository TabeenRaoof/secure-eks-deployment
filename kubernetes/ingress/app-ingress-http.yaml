# ---------------------------------------------------------------------------
# HTTP-only Ingress for demo / development.
# Use this when you don't have an ACM cert + custom domain ready.
# Apply EITHER this OR app-ingress-acm.yaml, not both (same name).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fintech-app-ingress
  namespace: fintech-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # Per-Service health checks (backend: /api/health, frontend: /) in services.yaml
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
