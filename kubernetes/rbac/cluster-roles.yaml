# ---------------------------------------------------------------------------
# ClusterRole: cluster-admin-role
# Full cluster access. Assign only to the platform/ops team lead.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin-role
  labels:
    project: fintech-secure
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# ---------------------------------------------------------------------------
# ClusterRole: developer-role
# Read/write access to workload resources (pods, deployments, services,
# configmaps, secrets, ingresses). No access to cluster-level resources
# like nodes, namespaces, or RBAC objects.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer-role
  labels:
    project: fintech-secure
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
# ---------------------------------------------------------------------------
# ClusterRole: viewer-role
# Read-only access across all namespaces. Safe for auditors, new team
# members, or CI pipelines that only need to inspect cluster state.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer-role
  labels:
    project: fintech-secure
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "namespaces", "nodes", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
