services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      SECRET_KEY: local-dev-secret
      JWT_SECRET_KEY: local-dev-jwt-secret
      DATABASE_URL: postgresql://fintech_user:fintech_password@db:5432/fintech_db
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
