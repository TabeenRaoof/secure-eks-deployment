# ---------------------------------------------------------------------------
# ServiceAccount: app-backend (fintech-app namespace)
# Annotated with IRSA to assume the app-workload IAM role.
# This gives backend pods scoped AWS permissions (Secrets Manager, KMS)
# without embedding credentials in the container.
#
# Replace <ACCOUNT_ID> with your AWS account number, or use:
#   terraform output app_workload_role_arn
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-backend
  namespace: fintech-app
  labels:
    project: fintech-secure
    app: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/fintech-secure-dev-app-workload-role
---
# ---------------------------------------------------------------------------
# ServiceAccount: app-frontend (fintech-app namespace)
# Frontend pods typically don't need AWS API access, so no IRSA annotation.
# A dedicated ServiceAccount still limits the pod's Kubernetes API
# permissions compared to using the default SA.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-frontend
  namespace: fintech-app
  labels:
    project: fintech-secure
    app: frontend
